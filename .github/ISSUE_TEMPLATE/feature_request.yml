name: Feature Request
description: Suggest an idea for Timety
title: '[FEAT] <Brief description>'
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea for Timety? We'd love to hear it! 
        *(Note: If you just want to discuss an idea before submitting a formal request, head over to our [GitHub Discussions](https://github.com/Benji377/Timety/discussions)!)*
  - type: textarea
    id: problem-description
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. How should it look and feel in the app?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, wireframes, or screenshots about the feature request here.
    validations:
      required: false
