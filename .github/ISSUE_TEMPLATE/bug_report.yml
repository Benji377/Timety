name: Bug Report
description: Create a report to help us improve Timety
title: '[BUG] <Brief description>'
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible so we can get it fixed.
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I click the start button on a focus session, the timer doesn't start...
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Tap on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recordings
      description: If applicable, drag and drop screenshots or a quick screen recording to help us debug the issue faster.
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: e.g., Google Pixel 7, iPhone 14
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: What operating system version is your device running?
      placeholder: e.g., Android 13, iOS 16.5
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App Version
      description: What version of Timety are you using?
      placeholder: e.g., 1.2.0
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: e.g., "This only happens when I am using a Dark Theme" or "This only happens on flexible habits".
    validations:
      required: false
