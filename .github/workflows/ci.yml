name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A new push to the same PR/branch supersedes the running checks; cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build, Test & Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write # SARIF upload to code scanning
      checks: write          # JUnit annotations on the PR
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # Handles Gradle caching (configuration-cache aware) and validates the
      # committed gradle-wrapper.jar against Gradle's official checksums.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run checks
        run: ./gradlew detekt testDebugUnitTest lintDebug assembleDebug

      - name: Upload Android Lint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint

      - name: Upload Detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/TEST-*.xml'
          detailed_summary: true
          include_passed: true

      - name: Add summary
        if: always()
        run: |
          echo "## Android Lint" >> "$GITHUB_STEP_SUMMARY"
          if [ -f app/build/reports/lint-results-debug.txt ]; then
            tail -n 1 app/build/reports/lint-results-debug.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No lint report generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## APK size (debug)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            # Tracked so accidental dependency bloat is visible on every PR.
            size=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk)
            echo "$(numfmt --to=iec-i --suffix=B "$size") ($size bytes)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No APK built." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.txt
            app/build/reports/detekt/detekt.html
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
