name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Static Analysis (Lint & Detekt)
  static-analysis:
    name: Lint & Detekt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Static Analysis
        run: ./gradlew detekt lintDebug --build-cache --parallel

      - name: Upload Android Lint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint

      - name: Upload Detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt

      - name: Upload Lint HTML Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/detekt/detekt.html

  # JOB 2: Build & Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Tests & Assemble
        run: ./gradlew testDebugUnitTest assembleDebug --build-cache --parallel

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/TEST-*.xml'
          detailed_summary: true
          include_passed: true

      - name: Add summary
        if: always()
        run: |
          echo "## APK size (debug)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            size=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk)
            echo "$(numfmt --to=iec-i --suffix=B "$size") ($size bytes)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No APK built." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
