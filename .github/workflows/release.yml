name: Build and Release Mobile Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive Adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --obfuscate

      - name: Rename APK Artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk timety-v${{ github.event.inputs.version }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: timety-apk
          path: |
            timety-v${{ github.event.inputs.version }}.apk

  build_aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive Adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build App Bundle
        run: flutter build appbundle --release --obfuscate

      - name: Rename AAB Artifact
        run: |
          mv build/app/outputs/bundle/release/app-release.aab timety-v${{ github.event.inputs.version }}.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v7
        with:
          name: timety-aab
          path: |
            timety-v${{ github.event.inputs.version }}.aab

  build_ios:
    name: Build iOS App Artifact
    runs-on: macos-15
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive Adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --obfuscate

      - name: Package iOS App Artifact
        run: |
          cd build/ios/iphoneos
          zip -r ../../../timety-v${{ github.event.inputs.version }}-ios.app.zip Runner.app

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: timety-ios
          path: |
            timety-v${{ github.event.inputs.version }}-ios.app.zip

  upload_to_release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions: write-all
    needs: [build_apk, build_aab, build_ios]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create attestation for build
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/*.apk
            artifacts/*.aab
            artifacts/*-ios.app.zip

      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          name: Timety v${{ github.event.inputs.version }}
          tag_name: v${{ github.event.inputs.version }}
          files: |
            artifacts/*.apk
            artifacts/*.aab
            artifacts/*-ios.app.zip
