name: Build and Release Mobile Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build_release:
    name: Build Android Release Artifacts
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

      - name: Build APK and AAB
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: release-keystore.jks
        run: |
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Rename Artifacts
        run: |
          mv app/build/outputs/apk/release/app-release.apk timety-v${{ github.event.inputs.version }}.apk
          mv app/build/outputs/bundle/release/app-release.aab timety-v${{ github.event.inputs.version }}.aab

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: timety-release-artifacts
          path: |
            timety-v${{ github.event.inputs.version }}.apk
            timety-v${{ github.event.inputs.version }}.aab

  upload_to_release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions: write-all
    needs: [build_release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: timety-release-artifacts
          path: artifacts

      - name: Create attestation for build
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.apk
            artifacts/*.aab

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: Timety v${{ github.event.inputs.version }}
          tag_name: v${{ github.event.inputs.version }}
          files: |
            artifacts/*.apk
            artifacts/*.aab
