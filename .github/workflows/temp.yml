name: Debug C++ Build ID Fix

on:
  workflow_dispatch:

jobs:
  test_sed_hack:
    name: Compare Sed Replacements
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: 'stable'
          flutter-version: '3.41.9'

      - name: Install dependencies
        run: flutter pub get

      # --- THE OLD METHOD EXPERIMENT ---
      
      - name: OLD METHOD - Print the Variable
        run: |
          echo "Let's see what the flutter-action output actually is:"
          echo "PUB-CACHE-PATH: '${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}'"
          
      - name: OLD METHOD - Test the Wildcard Path
        run: |
          echo "Checking if the shell can even find the file using the wildcard..."
          ls -la ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt || echo "FAILED: Could not find the file using the old wildcard path."

      - name: OLD METHOD - Run the Sed Command
        run: |
          echo "Attempting the old sed command..."
          sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt || echo "FAILED: Sed command crashed."

      - name: OLD METHOD - Verify Results
        run: |
          echo "Did the old method inject the text?"
          grep -H "build-id=none" ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt || echo "FAILED: No text was injected by the old method."


      # --- THE NEW METHOD EXPERIMENT ---

      - name: NEW METHOD - Run the Find + Sed Command
        run: |
          echo "Running the global Find and Replace..."
          find ~/.pub-cache/hosted -name "CMakeLists.txt" -exec sed -i -e 's/-Wl,/-Wl,--build-id=none,/g' {} + || true

      - name: NEW METHOD - Verify Results
        run: |
          echo "Did the new method inject the text?"
          find ~/.pub-cache/hosted -name "CMakeLists.txt" -exec grep -H "build-id=none" {} + || echo "FAILED: No text was injected by the new method."

      - name: Generate Hive Adapters
        run: dart run build_runner build --delete-conflicting-outputs
