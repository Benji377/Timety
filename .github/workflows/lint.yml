name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A new push to the same PR/branch supersedes the running lint; cancel it.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint

      - name: Add lint summary
        if: always()
        run: |
          echo "## Android Lint" >> "$GITHUB_STEP_SUMMARY"
          if [ -f app/build/reports/lint-results-debug.txt ]; then
            tail -n 1 app/build/reports/lint-results-debug.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No lint report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.txt
            app/build/reports/lint-results-debug.sarif
