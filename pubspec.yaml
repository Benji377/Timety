name: timety
description: "An offline-first Flutter app uniting tasks, focus timers, and habit tracking"
publish_to: 'none'
version: 1.1.0+4
environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5+1
  geolocator: ^14.0.2
  connectivity_plus: ^7.1.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  fl_chart: ^1.2.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  archive: ^4.0.9
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4


dependency_overrides:
  geolocator_android:
    git:
      url: https://github.com/onyx-lyon1/flutter-geolocator.git
      ref: floss
      path: geolocator_android


flutter:
  uses-material-design: true
  assets:
    - assets/logo.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true